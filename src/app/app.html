<main class="min-h-screen bg-gradient-to-br from-slate-100 via-white to-slate-200 px-4 py-6">
  <div class="mx-auto max-w-4xl">
    @if (portfolioData(); as data) {
      <app-header [data]="data.header"></app-header>
      <app-about-me [data]="data.aboutMe"></app-about-me>
      <app-experiences [experiences]="data.experiences"></app-experiences>
      <app-education [educations]="data.educations"></app-education>
      <app-skills [skills]="data.skills"></app-skills>
      <app-languages [languages]="data.languages"></app-languages>
      <app-works [works]="data.works"></app-works>
    } 
  </div>
</main>
