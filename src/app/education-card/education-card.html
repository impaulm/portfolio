<div
  class="w-full rounded-3xl border border-slate-200 bg-white/90 p-5 shadow-xl mb-4 transition-all duration-200 hover:-translate-y-1 hover:shadow-2xl hover:border-blue-300 hover:ring-2 hover:ring-blue-100"
>

  <div class="flex items-center gap-4">

    <!-- Logo école -->
    <div class="flex-shrink-0">
      <img
        [src]="education.schoolLogo"
        [alt]="education.school"
        class="h-12 w-12 rounded-xl object-contain bg-white p-1 border border-slate-200"
      />
    </div>

    <!-- Contenu -->
    <div class="flex flex-1 flex-col">

      <!-- Nom école -->
      <p class="text-sm font-semibold text-blue-600">
        {{ education.school }}
      </p>

      <!-- Diplôme -->
      <h3 class="text-lg font-bold text-slate-800">
        {{ education.degree }}
      </h3>

      <!-- Dates -->
      <p class="text-sm text-slate-500 mt-1">
        {{ education.startYear }} -
        {{ education.endYear  }}
      </p>

    </div>

  </div>

</div>
