<section class="w-full p-8">
  <h2 class="text-2xl font-bold text-slate-800">
    {{ title }}
  </h2>

  <div class="mt-2 mb-6 h-1 w-24 rounded bg-blue-500"></div>

  <div class="space-y-4">
    @for (language of languages; track language.name) {
      <app-language-card [language]="language"></app-language-card>
    }
  </div>
</section>
