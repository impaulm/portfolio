<div
  class="flex items-center justify-between rounded-2xl border border-slate-200 bg-white/90 px-5 py-4 mb-4 shadow-sm transition-all duration-200 hover:-translate-y-0.5 hover:shadow-md hover:border-blue-300 hover:ring-2 hover:ring-blue-100"
>
  <div class="flex items-center gap-4">
    <img
      [src]="language.flag"
      [alt]="'Drapeau ' + language.name"
      class="h-8 w-8 rounded-full object-cover"
    />

    <span class="text-base font-medium text-slate-800">
      {{ language.name }}
    </span>
  </div>

  <span class="text-sm font-semibold text-slate-800">
    {{ language.level }}
  </span>
</div>
