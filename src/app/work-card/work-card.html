<article
  class="flex h-[36rem] flex-col overflow-hidden rounded-3xl border border-slate-200 bg-white/90 shadow-xl transition-all duration-200 hover:-translate-y-1 hover:shadow-2xl"
>
  <div class="flex h-52 w-full items-center justify-center bg-slate-100">
    <img
      [src]="work.image"
      [alt]="work.name"
      class="max-h-full max-w-full object-contain"
    />
  </div>

  <div class="flex flex-1 flex-col p-6">
    <h3 class="line-clamp-2 text-xl font-bold text-slate-800">
      {{ work.name }}
    </h3>

    <p class="mt-2 text-sm text-slate-500">
      {{ work.startDate | date:'MMMM yyyy' }} -
      {{ work.endDate ? (work.endDate | date:'MMMM yyyy') : 'Présent' }}
    </p>

    <p class="mt-4 text-slate-600 text-sm leading-relaxed">
      {{ work.description }}
    </p>

    <div class="mt-auto flex flex-wrap gap-2 pt-5">
      @for (technology of work.technologies; track technology) {
        <span class="rounded-full border border-slate-800 bg-slate-700 px-3 py-1 text-sm font-medium text-slate-200">
          {{ technology }}
        </span>
      }
    </div>
  </div>
</article>
