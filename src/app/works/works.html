<section class="w-full p-8">
  <h2 class="text-2xl font-bold text-slate-800">
    {{ title }}
  </h2>

  <div class="mt-2 mb-6 h-1 w-24 rounded bg-blue-500"></div>

  <div class="grid gap-6 md:grid-cols-2">
    @for (work of works; track work.name) {
      <app-work-card [work]="work"></app-work-card>
    }
  </div>
</section>
